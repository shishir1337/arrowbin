<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1280" height="720" rx="24" fill="#ffffff"/>
  <text x="80" y="80" font-size="40" font-weight="700" fill="#0a0a0a">How to weight your decision</text>
  <text x="80" y="118" font-size="24" fill="#52525b">Suggested importance of each criterion when choosing a development partner</text>

  <g font-size="23" fill="#0a0a0a">
    <text x="80" y="228">Proven track record</text>
    <text x="80" y="303">Communication</text>
    <text x="80" y="378">Technical expertise</text>
    <text x="80" y="453">Process, testing &amp; QA</text>
    <text x="80" y="528">Partnership &amp; fit</text>
    <text x="80" y="603">Price</text>
  </g>

  <g>
    <rect x="480" y="198" width="700" height="44" rx="8" fill="#3f6212"/>
    <rect x="480" y="273" width="560" height="44" rx="8" fill="#4d7c0f"/>
    <rect x="480" y="348" width="560" height="44" rx="8" fill="#4d7c0f"/>
    <rect x="480" y="423" width="420" height="44" rx="8" fill="#65a30d"/>
    <rect x="480" y="498" width="280" height="44" rx="8" fill="#84cc16"/>
    <rect x="480" y="573" width="280" height="44" rx="8" fill="#a3e635"/>
  </g>

  <g font-size="23" font-weight="700" fill="#0a0a0a">
    <text x="1192" y="228">25%</text>
    <text x="1052" y="303">20%</text>
    <text x="1052" y="378">20%</text>
    <text x="912" y="453">15%</text>
    <text x="772" y="528">10%</text>
    <text x="772" y="603">10%</text>
  </g>

  <text x="80" y="688" font-size="18" fill="#a1a1aa">A guide, not a rule — adjust the weights to your project, but never let price outweigh proof.</text>
</svg>
