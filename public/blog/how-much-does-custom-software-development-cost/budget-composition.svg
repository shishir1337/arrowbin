<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1280" height="720" rx="24" fill="#ffffff"/>
  <text x="80" y="90" font-size="40" font-weight="700" fill="#0a0a0a">Where a custom software budget goes</text>
  <text x="80" y="130" font-size="24" fill="#52525b">Typical share of cost across a full project lifecycle</text>

  <!-- stacked bar -->
  <g>
    <rect x="100" y="240" width="108" height="150" fill="#1a2e05"/>
    <rect x="208" y="240" width="162" height="150" fill="#3f6212"/>
    <rect x="370" y="240" width="540" height="150" fill="#65a30d"/>
    <rect x="910" y="240" width="162" height="150" fill="#84cc16"/>
    <rect x="1072" y="240" width="108" height="150" fill="#bef264"/>
  </g>
  <!-- separators -->
  <g stroke="#ffffff" stroke-width="3">
    <line x1="208" y1="240" x2="208" y2="390"/>
    <line x1="370" y1="240" x2="370" y2="390"/>
    <line x1="910" y1="240" x2="910" y2="390"/>
    <line x1="1072" y1="240" x2="1072" y2="390"/>
  </g>
  <!-- in-bar percentages -->
  <g font-size="26" font-weight="700" text-anchor="middle">
    <text x="154" y="325" fill="#ffffff">10%</text>
    <text x="289" y="325" fill="#ffffff">15%</text>
    <text x="640" y="325" fill="#ffffff">50%</text>
    <text x="991" y="325" fill="#0a0a0a">15%</text>
    <text x="1126" y="325" fill="#0a0a0a">10%</text>
  </g>

  <!-- legend -->
  <g font-size="22" fill="#0a0a0a">
    <circle cx="108" cy="500" r="9" fill="#1a2e05"/>
    <text x="128" y="507">Discovery &amp; planning — 10%</text>
    <circle cx="528" cy="500" r="9" fill="#3f6212"/>
    <text x="548" y="507">UX/UI design — 15%</text>
    <circle cx="838" cy="500" r="9" fill="#65a30d"/>
    <text x="858" y="507">Development — 50%</text>
    <circle cx="108" cy="560" r="9" fill="#84cc16"/>
    <text x="128" y="567">QA &amp; testing — 15%</text>
    <circle cx="438" cy="560" r="9" fill="#bef264"/>
    <text x="458" y="567">Project management — 10%</text>
  </g>

  <text x="80" y="660" font-size="19" fill="#52525b">Development is the largest line, but the surrounding 50% — discovery, design, QA and PM — is</text>
  <text x="80" y="688" font-size="19" fill="#52525b">what separates software that ships and lasts from software that stalls.</text>
</svg>
