<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1280" height="720" rx="24" fill="#ffffff"/>
  <text x="80" y="80" font-size="40" font-weight="700" fill="#0a0a0a">Typical custom software rates by region</text>
  <text x="80" y="118" font-size="24" fill="#52525b">Blended hourly rate (USD) for a senior development team, 2026</text>

  <!-- gridlines + axis labels -->
  <g stroke="#e4e4e7" stroke-width="1">
    <line x1="140" y1="200" x2="1200" y2="200"/>
    <line x1="140" y1="333" x2="1200" y2="333"/>
    <line x1="140" y1="467" x2="1200" y2="467"/>
    <line x1="140" y1="600" x2="1200" y2="600"/>
  </g>
  <g font-size="20" fill="#a1a1aa" text-anchor="end">
    <text x="120" y="207">$150</text>
    <text x="120" y="340">$100</text>
    <text x="120" y="474">$50</text>
    <text x="120" y="607">$0</text>
  </g>

  <!-- bars -->
  <g>
    <rect x="186" y="200" width="120" height="400" rx="8" fill="#3f6212"/>
    <rect x="398" y="280" width="120" height="320" rx="8" fill="#4d7c0f"/>
    <rect x="610" y="413" width="120" height="187" rx="8" fill="#65a30d"/>
    <rect x="822" y="440" width="120" height="160" rx="8" fill="#84cc16"/>
    <rect x="1034" y="493" width="120" height="107" rx="8" fill="#a3e635"/>
  </g>

  <!-- value labels -->
  <g font-size="24" font-weight="700" fill="#0a0a0a" text-anchor="middle">
    <text x="246" y="184">$120–180</text>
    <text x="458" y="264">$90–150</text>
    <text x="670" y="397">$50–90</text>
    <text x="882" y="424">$45–80</text>
    <text x="1094" y="477">$25–60</text>
  </g>

  <!-- category labels -->
  <g font-size="21" fill="#52525b" text-anchor="middle">
    <text x="246" y="636">North America</text>
    <text x="458" y="636">Western Europe</text>
    <text x="670" y="636">Eastern Europe</text>
    <text x="882" y="636">Latin America</text>
    <text x="1094" y="636">South Asia</text>
  </g>

  <text x="80" y="690" font-size="18" fill="#a1a1aa">Source: Arrowbin 2026 market estimate. Rates vary by seniority, scope and engagement model.</text>
</svg>
